version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: queuepilot-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/queuepilot
      JWT_SECRET: queuepilot-secret
      CLIENT_URL: http://localhost:5173
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: queuepilot-frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

  mongo:
    image: mongo:7
    container_name: queuepilot-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
